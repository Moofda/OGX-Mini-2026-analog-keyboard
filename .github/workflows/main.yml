name: Reset to a8
on:
  workflow_dispatch:
jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Reset to a8 commit
        run: |
          git fetch origin
          git reset --hard bbaa6a1776256774deece6504338b0f7f522c0ad
          git push --force
